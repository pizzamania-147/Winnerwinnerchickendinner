<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍻 술값의 주인공은? 🍻</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; }
        .skeleton { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        
        /* 💀 꼴찌 덜덜덜 지진 애니메이션 */
        @keyframes shiver {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shiver { animation: shiver 0.3s infinite; } /* 격렬하게 떨림 */
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto space-y-8">
        <header class="text-center py-6">
            <h1 class="text-4xl md:text-5xl font-black text-slate-900 drop-shadow-sm">🍻 술값의 주인공은? 🍻</h1>
            <p class="text-sm md:text-base text-slate-500 mt-2 font-bold">기준가: 한국 주식 2/26(목) 종가 vs 미국 주식 2/26(목) 시가</p>
            
            <div id="countdown" class="mt-4 inline-block bg-slate-800 text-yellow-300 px-4 md:px-6 py-2 rounded-full font-bold text-xs sm:text-sm md:text-base shadow-md tracking-wide">
                ⏳ 결전의 날 계산 중...
            </div>
        </header>

        <div id="loading" class="text-center py-20 text-xl font-bold text-blue-600 skeleton">
            데이터 우회 서버를 탐색 중입니다. 잠시만 기다려주세요... 🚀
        </div>
        
        <div id="error-box" class="hidden bg-red-100 text-red-700 p-4 rounded-xl text-center font-bold"></div>

        <div id="content" class="hidden space-y-8">
            <section class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div id="winner-card" onclick="triggerConfetti()" class="bg-gradient-to-br from-yellow-300 to-yellow-500 rounded-2xl p-6 shadow-lg text-center transform hover:scale-105 transition relative z-10 cursor-pointer">
                    <div class="text-5xl mb-2">👑</div>
                    <h2 class="text-2xl font-bold text-yellow-900">현재 1등 (🐐주식GOAT🐐)</h2>
                    <div id="winner-info" class="text-3xl font-black text-white mt-2 drop-shadow-md"></div>
                </div>
                <div id="loser-card" onclick="triggerShiver()" class="bg-gradient-to-br from-red-500 to-rose-700 rounded-2xl p-6 shadow-lg text-center transform hover:scale-105 transition cursor-pointer">
                    <div class="text-5xl mb-2">💀</div>
                    <h2 class="text-2xl font-bold text-red-100">현재 꼴지 (술값 준비하십쇼💸)</h2>
                    <div id="loser-info" class="text-3xl font-black text-white mt-2 drop-shadow-md"></div>
                </div>
            </section>

            <section class="bg-white rounded-2xl shadow-md overflow-hidden border border-slate-100">
                <div class="bg-blue-600 text-white text-center py-3 font-bold text-lg">📊 현재 수익률 순위</div>
                <ul id="list-return" class="divide-y divide-slate-100 p-4"></ul>
            </section>

            <section class="bg-white rounded-2xl p-4 md:p-6 shadow-md border border-slate-100">
                <h3 class="text-lg font-bold mb-4 text-slate-700">📈 2/26 이후 수익률 추이</h3>
                <div class="relative h-[350px] md:h-[400px] w-full">
                    <canvas id="priceChart"></canvas>
                </div>
            </section>

            <section class="bg-white rounded-2xl p-4 md:p-6 shadow-md border border-slate-100">
                <h3 class="text-lg font-bold mb-4 text-slate-700">📉 2/26 이후 순위 변동 추이</h3>
                
                <div id="rank-summary" class="flex flex-wrap gap-2 md:gap-4 mb-4 p-3 bg-slate-50 rounded-xl justify-center"></div>

                <div class="relative h-[250px] md:h-[300px] w-full mt-4">
                    <canvas id="rankChart"></canvas>
                </div>
            </section>

            <section class="bg-white rounded-2xl p-4 md:p-6 shadow-md border border-slate-100">
                <h3 class="text-lg font-bold mb-4 text-slate-700">📌 고른 종목 및 현재가 (원화 환산)</h3>
                <ul id="list-current-price" class="divide-y divide-slate-100"></ul>
            </section>
        </div>
    </div>

    <script>
        const BASE_DATE = "2026-02-26";
        const PROXIES = [
            "https://corsproxy.io/?",
            "https://api.allorigins.win/raw?url=",
            "https://api.codetabs.com/v1/proxy?quest="
        ];
        
        const participants = [
            { name: "지빈", stockName: "한전기술", ticker: "052690.KS", color: "#3B82F6", isUS: false }, 
            { name: "병호", stockName: "Nvidia", ticker: "NVDA", color: "#10B981", isUS: true },      
            { name: "성근", stockName: "KLA", ticker: "KLAC", color: "#8B5CF6", isUS: true },      
            { name: "핵잠", stockName: "Tesla", ticker: "TSLA", color: "#EF4444", isUS: true },      
            { name: "구보", stockName: "NuScale", ticker: "SMR", color: "#F59E0B", isUS: true }        
        ];
        const KRW_USD_TICKER = "KRW=X";

        // ⏳ D-Day 카운트다운 타이머
        function updateCountdown() {
            const targetDate = new Date("2026-08-26T00:00:00+09:00").getTime(); 
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.getElementById("countdown").innerHTML = "🎉 결전의 날이 밝았습니다! 지갑을 여십시오! 💳";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("countdown").innerHTML = `⏳ 결전(8/26)까지: <b>${days}일 ${hours}시간 ${minutes}분 ${seconds}초</b>`;
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();

        // 🎉 1등 카드 클릭 시 팡파르 트리거
        function triggerConfetti() {
            var duration = 2000; 
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 100 };

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: 0.2, y: 0.5 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: 0.8, y: 0.5 } }));
            }, 250);
        }

        // 💀 꼴찌 카드 클릭 시 지진 트리거
        function triggerShiver() {
            const card = document.getElementById('loser-card');
            
            if (card.classList.contains('shiver')) return;
            
            card.classList.add('shiver');
            
            setTimeout(() => {
                card.classList.remove('shiver');
            }, 1500);
        }

        function showError(msg) {
            document.getElementById('loading').style.display = 'none';
            const errorBox = document.getElementById('error-box');
            errorBox.innerHTML = msg;
            errorBox.classList.remove('hidden');
        }

        async function fetchYahooData(ticker) {
            const targetUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?range=6mo&interval=1d&cb=${Date.now()}`;
            for (let proxy of PROXIES) {
                try {
                    let fetchUrl = proxy.includes('codetabs') ? proxy + targetUrl : proxy + encodeURIComponent(targetUrl);
                    const response = await fetch(fetchUrl);
                    if (!response.ok) continue; 
                    
                    const data = await response.json();
                    if (!data.chart || !data.chart.result) continue;
                    
                    const result = data.chart.result[0];
                    const timestamps = result.timestamp || [];
                    const opens = result.indicators.quote[0].open || [];
                    const closes = result.indicators.quote[0].close || [];
                    
                    let history = {};
                    for (let i = 0; i < timestamps.length; i++) {
                        if (closes[i] !== null && closes[i] !== undefined) {
                            let d = new Date(timestamps[i] * 1000);
                            let dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                            history[dateStr] = {
                                open: opens[i] || closes[i], 
                                close: closes[i]
                            };
                        }
                    }
                    return history; 
                } catch (error) {
                    console.warn(`[Proxy Failed] ${proxy} for ${ticker}`);
                }
            }
            return null; 
        }

        async function init() {
            const promises = participants.map(p => fetchYahooData(p.ticker));
            promises.push(fetchYahooData(KRW_USD_TICKER));
            const results = await Promise.all(promises);
            
            const exRateHistory = results.pop(); 
            let hasError = false;
            let errorTickers = [];

            participants.forEach((p, idx) => {
                p.rawHistory = results[idx];
                if (!p.rawHistory) {
                    hasError = true;
                    errorTickers.push(p.name);
                }
            });

            if (hasError || !exRateHistory) {
                showError(`🚨 방화벽이 너무 강력합니다! (${errorTickers.join(', ')} 데이터를 불러오지 못함)<br>잠시 후 새로고침 해보시거나 네트워크 환경을 바꿔보세요.`);
                return;
            }

            let allDatesSet = new Set();
            participants.forEach(p => Object.keys(p.rawHistory).forEach(d => allDatesSet.add(d)));
            Object.keys(exRateHistory).forEach(d => allDatesSet.add(d));
            let allDates = Array.from(allDatesSet).sort();

            let lastKnownRates = 1350; 
            participants.forEach(p => { p.historyKRW = {}; p.lastKnownOpen = 0; p.lastKnownClose = 0; });

            allDates.forEach(date => {
                if (exRateHistory[date]) lastKnownRates = exRateHistory[date].close; 
                
                participants.forEach(p => {
                    if (p.rawHistory[date]) {
                        p.lastKnownOpen = p.rawHistory[date].open;
                        p.lastKnownClose = p.rawHistory[date].close;
                    }
                    if (p.lastKnownClose > 0) {
                        p.historyKRW[date] = {
                            open: p.isUS ? p.lastKnownOpen * lastKnownRates : p.lastKnownOpen,
                            close: p.isUS ? p.lastKnownClose * lastKnownRates : p.lastKnownClose
                        };
                    }
                });
            });

            const validDates = allDates.filter(d => participants.every(p => p.historyKRW[d] !== undefined));
            if (validDates.length === 0) return showError("🚨 아직 공통된 거래일 데이터가 충분히 쌓이지 않았습니다.");

            let baselineIndex = validDates.findIndex(d => d >= BASE_DATE);
            if (baselineIndex === -1) baselineIndex = validDates.length - 1; 
            
            const actualBaseDate = validDates[baselineIndex];
            const currentDate = validDates[validDates.length - 1];

            const filteredDates = validDates.filter(d => d >= actualBaseDate);
            const chartDates = ["시작점 (100)", ...filteredDates];

            participants.forEach(p => {
                if (p.isUS) {
                    p.basePrice = p.historyKRW[actualBaseDate].open || 1; 
                } else {
                    p.basePrice = p.historyKRW[actualBaseDate].close || 1; 
                }
                
                p.currentPrice = p.historyKRW[currentDate].close || 0;
                p.returnRate = ((p.currentPrice - p.basePrice) / p.basePrice) * 100;
                if (isNaN(p.returnRate)) p.returnRate = 0;
                
                p.chartData = chartDates.map(d => {
                    if (d === "시작점 (100)") return 100;
                    return (p.historyKRW[d].close / p.basePrice) * 100;
                });

                p.rankData = [];
            });

            filteredDates.forEach(d => {
                let dailyReturns = participants.map(p => {
                    let currentClose = p.historyKRW[d].close || 0;
                    let ret = ((currentClose - p.basePrice) / p.basePrice) * 100;
                    return { name: p.name, ret: isNaN(ret) ? 0 : ret };
                });

                dailyReturns.sort((a, b) => b.ret - a.ret);

                participants.forEach(p => {
                    let rank = dailyReturns.findIndex(dr => dr.name === p.name) + 1;
                    p.rankData.push(rank);
                });
            });

            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').classList.remove('hidden');

            renderSummary();
            renderLists();
            renderRankSummary(); 
            renderChart(chartDates);
            renderRankChart(filteredDates);
            renderCurrentPrices();
        }

        function renderSummary() {
            const sortedByReturn = [...participants].sort((a, b) => b.returnRate - a.returnRate);
            const winner = sortedByReturn[0];
            const loser = sortedByReturn[sortedByReturn.length - 1];

            document.getElementById('winner-info').innerHTML = `${winner.name} <span class="text-xl font-normal opacity-80">(${winner.stockName})</span><br><span class="text-xl">(${winner.returnRate > 0 ? '+' : ''}${winner.returnRate.toFixed(2)}%)</span>`;
            document.getElementById('loser-info').innerHTML = `${loser.name} <span class="text-xl font-normal opacity-80">(${loser.stockName})</span><br><span class="text-xl">(${loser.returnRate > 0 ? '+' : ''}${loser.returnRate.toFixed(2)}%)</span>`;
        }

        function renderLists() {
            const sortedByReturn = [...participants].sort((a, b) => b.returnRate - a.returnRate);
            const returnList = document.getElementById('list-return');
            
            sortedByReturn.forEach((p, idx) => {
                const color = p.returnRate >= 0 ? 'text-red-500' : 'text-blue-500';
                returnList.innerHTML += `<li class="py-3 flex justify-between items-center px-2 hover:bg-slate-50 transition">
                    <span class="font-bold flex items-center gap-2">
                        <span class="w-6 h-6 rounded-full text-white flex items-center justify-center text-sm" style="background-color: ${p.color}">${idx + 1}</span>
                        ${p.name} <span class="text-sm text-slate-500 font-normal">(${p.stockName})</span>
                    </span>
                    <span class="${color} font-bold text-lg">${p.returnRate > 0 ? '+' : ''}${p.returnRate.toFixed(2)}%</span>
                </li>`;
            });
        }

        function renderRankSummary() {
            const summaryContainer = document.getElementById('rank-summary');
            let html = "";
            
            const sortedParticipants = [...participants].sort((a, b) => {
                const aCurrentRank = a.rankData[a.rankData.length - 1];
                const bCurrentRank = b.rankData[b.rankData.length - 1];
                return aCurrentRank - bCurrentRank;
            });

            sortedParticipants.forEach(p => {
                const currentRank = p.rankData[p.rankData.length - 1];
                const prevRank = p.rankData.length > 1 ? p.rankData[p.rankData.length - 2] : currentRank;
                const diff = prevRank - currentRank; 
                
                let icon = diff === 0 ? '<span class="text-slate-400 font-bold">-</span>' : 
                           diff > 0 ? `<span class="text-red-500 font-bold">▲${diff}</span>` : 
                           `<span class="text-blue-500 font-bold">▼${Math.abs(diff)}</span>`;

                html += `<div class="bg-white px-3 py-2 rounded-lg border border-slate-200 shadow-sm flex items-center gap-2 text-sm whitespace-nowrap">
                    <span class="w-3 h-3 rounded-full" style="background-color: ${p.color}"></span>
                    <span class="font-bold">${p.name} <span class="font-normal text-slate-500 text-xs">(${p.stockName})</span></span>
                    <span class="text-slate-600 ml-1">${currentRank}위</span>
                    <span class="w-6 text-right">${icon}</span>
                </div>`;
            });

            summaryContainer.innerHTML = html;
        }

        function renderCurrentPrices() {
            const priceList = document.getElementById('list-current-price');
            let html = "";
            
            const sortedParticipants = [...participants].sort((a, b) => b.returnRate - a.returnRate);

            sortedParticipants.forEach(p => {
                html += `<li class="py-3 flex justify-between items-center px-2 hover:bg-slate-50 transition">
                    <span class="font-bold flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full" style="background-color: ${p.color}"></span>
                        ${p.name} <span class="text-sm text-slate-500 font-normal">(${p.stockName})</span>
                    </span>
                    <span class="font-bold text-slate-700">₩${Math.round(p.currentPrice).toLocaleString()}</span>
                </li>`;
            });

            priceList.innerHTML = html;
        }

        const getLegendOptions = () => {
            const isMobile = window.innerWidth < 768;
            return {
                position: isMobile ? 'bottom' : 'top', 
                labels: {
                    usePointStyle: true, 
                    boxWidth: 8,
                    padding: 15,
                    font: { size: isMobile ? 11 : 13 }
                }
            };
        };

        function renderChart(labels) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            const referenceLine = Array(labels.length).fill(100);

            const datasets = participants.map(p => ({
                label: `${p.name} (${p.stockName})`,
                data: p.chartData,
                borderColor: p.color,
                backgroundColor: p.color,
                borderWidth: 2,
                pointRadius: 1, 
                pointHoverRadius: 6,
                tension: 0.1,
                showLine: true
            }));

            datasets.push({
                label: '기준선 (100)',
                data: referenceLine,
                borderColor: '#94A3B8',
                borderWidth: 2,
                borderDash: [5, 5],
                pointRadius: 0,
                fill: false,
                order: 10
            });

            new Chart(ctx, {
                type: 'line', 
                data: { labels: labels, datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    scales: {
                        x: { display: true },
                        y: { 
                            display: true, 
                            title: { display: true, text: '상대 가치' }
                        }
                    },
                    plugins: {
                        legend: getLegendOptions(),
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    if (context.dataset.label === '기준선 (100)') return null; 
                                    return `${context.dataset.label}: ${context.raw.toFixed(1)} 포인트`;
                                }
                            }
                        }
                    }
                }
            });
        }

        function renderRankChart(labels) {
            const ctx = document.getElementById('rankChart').getContext('2d');
            
            const datasets = participants.map(p => ({
                label: `${p.name} (${p.stockName})`,
                data: p.rankData,
                borderColor: p.color,
                backgroundColor: p.color,
                borderWidth: 3, 
                pointRadius: 4, 
                pointHoverRadius: 8,
                tension: 0.1,
                showLine: true
            }));

            new Chart(ctx, {
                type: 'line', 
                data: { labels: labels, datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    scales: {
                        x: { display: true },
                        y: { 
                            display: true, 
                            reverse: true,
                            min: 1,
                            max: 5, 
                            ticks: {
                                stepSize: 1,
                                callback: function(value) {
                                    return value + '위';
                                }
                            },
                            title: { display: true, text: '순위' }
                        }
                    },
                    plugins: {
                        legend: getLegendOptions(),
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return `${context.dataset.label}: ${context.raw}위`;
                                }
                            }
                        }
                    }
                }
            });
        }

        init();
    </script>
</body>
</html>
