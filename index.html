<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다음 모임 술값은 누가?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; }
        .skeleton { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto space-y-8">
        <header class="text-center py-6">
            <h1 class="text-4xl md:text-5xl font-black text-slate-900 drop-shadow-sm">🍻 다음 모임 술값은 누가? 🍻</h1>
            <p class="text-slate-500 mt-2">기준일: 2026년 2월 26일 (목요일) 종가 기준</p>
        </header>

        <div id="loading" class="text-center py-20 text-xl font-bold text-blue-600 skeleton">
            주식 및 환율 데이터를 실시간으로 불러오고 계산하는 중입니다... 🚀
        </div>
        
        <div id="error-box" class="hidden bg-red-100 text-red-700 p-4 rounded-xl text-center font-bold">
            </div>

        <div id="content" class="hidden space-y-8">
            <section class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-gradient-to-br from-yellow-300 to-yellow-500 rounded-2xl p-6 shadow-lg text-center transform hover:scale-105 transition">
                    <div class="text-5xl mb-2">👑</div>
                    <h2 class="text-2xl font-bold text-yellow-900">현재 1등 (주식GOD🐥)</h2>
                    <div id="winner-info" class="text-3xl font-black text-white mt-2 drop-shadow-md"></div>
                </div>
                <div class="bg-gradient-to-br from-red-500 to-rose-700 rounded-2xl p-6 shadow-lg text-center transform hover:scale-105 transition">
                    <div class="text-5xl mb-2">💀</div>
                    <h2 class="text-2xl font-bold text-red-100">현재 꼴지 (술값 당첨!)</h2>
                    <div id="loser-info" class="text-3xl font-black text-white mt-2 drop-shadow-md"></div>
                </div>
            </section>

            <section class="bg-white rounded-2xl p-4 md:p-6 shadow-md border border-slate-100">
                <h3 class="text-xl font-bold mb-4">📈 6개월 가격 추이 (원화 환산 종가)</h3>
                <div class="relative h-[400px] w-full">
                    <canvas id="priceChart"></canvas>
                </div>
            </section>

            <section class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white rounded-2xl shadow-md overflow-hidden border border-slate-100">
                    <div class="bg-slate-800 text-white text-center py-3 font-bold">💰 현재 종가 순위</div>
                    <ul id="list-price" class="divide-y divide-slate-100 p-4"></ul>
                </div>
                <div class="bg-white rounded-2xl shadow-md overflow-hidden border border-slate-100">
                    <div class="bg-blue-600 text-white text-center py-3 font-bold">📊 2/26 대비 수익률 순위</div>
                    <ul id="list-return" class="divide-y divide-slate-100 p-4"></ul>
                </div>
                <div class="bg-white rounded-2xl shadow-md overflow-hidden border border-slate-100">
                    <div class="bg-purple-600 text-white text-center py-3 font-bold">⚖️ 종가 순위 vs 수익률 순위</div>
                    <ul id="list-diff" class="divide-y divide-slate-100 p-4"></ul>
                </div>
            </section>
        </div>
    </div>

    <script>
        // 1. 설정
        const BASE_DATE = "2026-02-26";
        // /get 대신 /raw를 사용하여 파싱 오류 원천 차단
        const PROXY = "https://api.allorigins.win/raw?url=";
        
        // 2. 트랙킹 주식 리스트
        const participants = [
            { name: "지빈", ticker: "052690.KS", color: "#3B82F6", isUS: false }, 
            { name: "병호", ticker: "NVDA", color: "#10B981", isUS: true },      
            { name: "성근", ticker: "KLAC", color: "#8B5CF6", isUS: true },      
            { name: "핵잠", ticker: "TSLA", color: "#EF4444", isUS: true },      
            { name: "구보", ticker: "SMR", color: "#F59E0B", isUS: true }        
        ];
        const KRW_USD_TICKER = "KRW=X";

        // 오류 출력 헬퍼 함수
        function showError(msg) {
            document.getElementById('loading').style.display = 'none';
            const errorBox = document.getElementById('error-box');
            errorBox.innerHTML = msg;
            errorBox.classList.remove('hidden');
        }

        // Yahoo Finance 데이터 패치 함수
        async function fetchYahooData(ticker) {
            // 캐시 방지를 위해 cb(시간) 파라미터 추가
            const targetUrl = encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?range=6mo&interval=1d&cb=${Date.now()}`);
            try {
                const response = await fetch(PROXY + targetUrl);
                if (!response.ok) throw new Error("네트워크 응답 불량");
                
                const data = await response.json();
                if (!data.chart || !data.chart.result) throw new Error("데이터 구조 이상");
                
                const result = data.chart.result[0];
                const timestamps = result.timestamp || [];
                const closes = result.indicators.quote[0].close || [];
                
                let history = {};
                for (let i = 0; i < timestamps.length; i++) {
                    if (closes[i] !== null && closes[i] !== undefined) {
                        // 타임스탬프를 YYYY-MM-DD 형식으로 변환 (안정성 확보)
                        let d = new Date(timestamps[i] * 1000);
                        let dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                        history[dateStr] = closes[i];
                    }
                }
                return history;
            } catch (error) {
                console.error(`Error fetching ${ticker}:`, error);
                return null; // 실패 시 null 반환
            }
        }

        async function init() {
            // 모든 데이터 동시 Fetch
            const promises = participants.map(p => fetchYahooData(p.ticker));
            promises.push(fetchYahooData(KRW_USD_TICKER));
            const results = await Promise.all(promises);
            
            const exRateHistory = results.pop(); 
            let hasError = false;
            let errorTickers = [];

            // Fetch 실패 검증
            participants.forEach((p, idx) => {
                p.rawHistory = results[idx];
                if (!p.rawHistory) {
                    hasError = true;
                    errorTickers.push(p.name);
                }
            });

            if (hasError || !exRateHistory) {
                showError(`🚨 데이터를 불러오지 못했습니다. (${errorTickers.join(', ')} 또는 환율)<br>API 제한에 걸렸을 수 있으니 잠시 후 다시 시도해주세요.`);
                return;
            }

            // 모든 거래일 통합 및 정렬
            let allDatesSet = new Set();
            participants.forEach(p => Object.keys(p.rawHistory).forEach(d => allDatesSet.add(d)));
            Object.keys(exRateHistory).forEach(d => allDatesSet.add(d));
            let allDates = Array.from(allDatesSet).sort();

            let lastKnownRates = 1350; // 환율 기본값
            participants.forEach(p => { p.historyKRW = {}; p.lastKnownPrice = 0; });

            // Forward Fill 로직 및 원화 환산
            allDates.forEach(date => {
                if (exRateHistory[date]) lastKnownRates = exRateHistory[date];
                
                participants.forEach(p => {
                    if (p.rawHistory[date]) p.lastKnownPrice = p.rawHistory[date];
                    if (p.lastKnownPrice > 0) {
                        p.historyKRW[date] = p.isUS ? p.lastKnownPrice * lastKnownRates : p.lastKnownPrice;
                    }
                });
            });

            // 유효한 날짜(모든 주식 데이터가 존재하는 날) 필터링
            const validDates = allDates.filter(d => participants.every(p => p.historyKRW[d] !== undefined));
            if (validDates.length === 0) {
                showError("🚨 공통된 거래일 데이터가 없어 계산할 수 없습니다.");
                return;
            }

            // 기준일 찾기 (2/26일 또는 가장 가까운 그 이후 날짜, 없으면 맨 마지막 날짜)
            let baselineIndex = validDates.findIndex(d => d >= BASE_DATE);
            if (baselineIndex === -1) baselineIndex = validDates.length - 1; 
            
            const actualBaseDate = validDates[baselineIndex];
            const currentDate = validDates[validDates.length - 1];

            // 수익률 및 순위 계산 (NaN 방지 처리)
            participants.forEach(p => {
                p.basePrice = p.historyKRW[actualBaseDate] || 1; 
                p.currentPrice = p.historyKRW[currentDate] || 0;
                p.returnRate = ((p.currentPrice - p.basePrice) / p.basePrice) * 100;
                if (isNaN(p.returnRate)) p.returnRate = 0;
                
                p.chartData = validDates.map(d => p.historyKRW[d]);
            });

            // 렌더링 시작
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').classList.remove('hidden');

            renderSummary();
            renderChart(validDates);
            renderLists();
        }

        function renderSummary() {
            const sortedByReturn = [...participants].sort((a, b) => b.returnRate - a.returnRate);
            const winner = sortedByReturn[0];
            const loser = sortedByReturn[sortedByReturn.length - 1];

            document.getElementById('winner-info').innerHTML = `${winner.name}<br><span class="text-xl">(${winner.returnRate > 0 ? '+' : ''}${winner.returnRate.toFixed(2)}%)</span>`;
            document.getElementById('loser-info').innerHTML = `${loser.name}<br><span class="text-xl">(${loser.returnRate > 0 ? '+' : ''}${loser.returnRate.toFixed(2)}%)</span>`;
        }

        function renderChart(labels) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            const datasets = participants.map(p => ({
                label: p.name,
                data: p.chartData,
                borderColor: p.color,
                backgroundColor: p.color,
                borderWidth: 2,
                pointRadius: 1, 
                pointHoverRadius: 6,
                tension: 0.1,
                showLine: true
            }));

            new Chart(ctx, {
                type: 'line', 
                data: { labels: labels, datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    scales: {
                        x: { display: true },
                        y: { display: true, title: { display: true, text: '종가 (원화)' } }
                    },
                    plugins: {
                        legend: { position: 'top' },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return `${context.dataset.label}: ₩${Math.round(context.raw).toLocaleString()}`;
                                }
                            }
                        }
                    }
                }
            });
        }

        function renderLists() {
            const sortedByPrice = [...participants].sort((a, b) => b.currentPrice - a.currentPrice);
            const priceList = document.getElementById('list-price');
            sortedByPrice.forEach((p, idx) => {
                p.priceRank = idx + 1; 
                priceList.innerHTML += `<li class="py-3 flex justify-between items-center">
                    <span class="font-bold">${idx + 1}. ${p.name}</span>
                    <span class="text-slate-600">₩${Math.round(p.currentPrice).toLocaleString()}</span>
                </li>`;
            });

            const sortedByReturn = [...participants].sort((a, b) => b.returnRate - a.returnRate);
            const returnList = document.getElementById('list-return');
            sortedByReturn.forEach((p, idx) => {
                p.returnRank = idx + 1; 
                const color = p.returnRate >= 0 ? 'text-red-500' : 'text-blue-500';
                returnList.innerHTML += `<li class="py-3 flex justify-between items-center">
                    <span class="font-bold">${idx + 1}. ${p.name}</span>
                    <span class="${color} font-bold">${p.returnRate > 0 ? '+' : ''}${p.returnRate.toFixed(2)}%</span>
                </li>`;
            });

            const diffList = document.getElementById('list-diff');
            participants.forEach(p => {
                const diff = p.priceRank - p.returnRank;
                let diffText = diff === 0 ? '<span class="text-slate-400">-</span>' : 
                               diff > 0 ? `<span class="text-red-500">▲${diff}</span>` : 
                               `<span class="text-blue-500">▼${Math.abs(diff)}</span>`;
                
                diffList.innerHTML += `<li class="py-3 flex justify-between items-center text-sm">
                    <span class="font-bold w-16">${p.name}</span>
                    <span>종가 ${p.priceRank}위</span>
                    <span>수익 ${p.returnRank}위</span>
                    <span class="w-8 text-right font-bold">${diffText}</span>
                </li>`;
            });
        }

        // 실행
        init();
    </script>
</body>
</html>
